<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="ぷにぷにタウン — かわいいぷにぷにキャラを集めて街を発展させるクリッカー×コレクションゲーム！" />
  <meta name="theme-color" content="#FF8FAB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ぷにぷにタウン 🏘️</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-D8KxFJZO.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DnfVD0NC.css">
</head>

<body>
  <div id="app">
    <!-- ヘッダー -->
    <header id="game-header">
      <div class="header-left">
        <span class="level-badge">Lv.<span id="level-count">1</span></span>
      </div>
      <div class="header-center">
        <span class="coin-display">🪙 <span id="coin-count">0</span></span>
      </div>
      <div class="header-right">
        <span id="auto-income-display" class="auto-income"></span>
      </div>
    </header>

    <!-- メインキャンバスエリア -->
    <div id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- タブコンテンツオーバーレイ -->
    <div id="tab-content-overlay" class="tab-content-overlay hidden">
      <div id="tab-content-inner" class="tab-content-inner"></div>
    </div>

    <!-- モーダル -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-content">
        <div id="modal-body"></div>
        <button id="modal-close" class="modal-close-btn">とじる</button>
      </div>
    </div>

    <!-- タブバー -->
    <nav id="tab-bar" class="tab-bar">
      <button class="tab-btn active" data-tab="town">
        <span class="tab-icon">🏘️</span>
        <span class="tab-label">街</span>
      </button>
      <button class="tab-btn" data-tab="gacha">
        <span class="tab-icon">🎰</span>
        <span class="tab-label">ガチャ</span>
      </button>
      <button class="tab-btn" data-tab="collection">
        <span class="tab-icon">📚</span>
        <span class="tab-label">コレクション</span>
      </button>
      <button class="tab-btn" data-tab="ranking">
        <span class="tab-icon">🏆</span>
        <span class="tab-label">ランキング</span>
      </button>
    </nav>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }
  </script>
</body>

</html>
